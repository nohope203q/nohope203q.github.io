# The Site Configuration

# Import the theme
theme: jekyll-theme-chirpy

# Language and timezone
lang: en
timezone: Asia/Ho_Chi_Minh

# Site information
title: aptx-4869

tagline: Web Security | Penetration Testing | CTF Writeups

description: >-
  Personal cybersecurity blog documenting web security labs, CTF writeups,
  secure coding projects, vulnerability assessment notes, and penetration testing learning progress.

# Site URL
url: "https://nohope203q.github.io"
baseurl: ""

# GitHub information
github:
  username: nohope203q

# Twitter / X username, leave empty if unused
twitter:
  username:

# Social information
social:
  name: Huynh Thien Hao
  email: haohynh203.work@gmail.com
  fediverse_handle:
  links:
    - https://github.com/nohope203q
    - https://nohope203q.github.io
    # - https://www.linkedin.com/in/your-linkedin

# Site Verification Settings
webmaster_verifications:
  google:
  bing:
  alexa:
  yandex:
  baidu:
  facebook:

# Web Analytics Settings
analytics:
  google:
    id:
  goatcounter:
    id:
  umami:
    id:
    domain:
  matomo:
    id:
    domain:
  cloudflare:
    id:
  fathom:
    id:

# Page views settings
pageviews:
  provider:

# Theme mode: light | dark
# Use dark for cybersecurity / hacker-style portfolio
theme_mode: dark

# CDN endpoint for media resources
cdn:

# Sidebar avatar
# Put your image at: assets/img/avatar.jpg
avatar: /assets/img/avatar.jpg

# Site-wide social preview image
# Optional. You can create this later.
social_preview_image:

# Enable table of contents in posts
toc: true

actions:
  edit_post:
    enabled: false
    url: ""
    static_url: false

# Comments system
# Leave disabled for now
comments:
  provider:
  disqus:
    shortname:
  utterances:
    repo:
    issue_term:
  giscus:
    repo:
    repo_id:
    category:
    category_id:
    mapping:
    strict:
    input_position:
    lang:
    reactions_enabled:

# Static assets
assets:
  self_host:
    enabled:
    env:

# Progressive Web App
pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths:

# Pagination
paginate: 10

# Markdown and syntax highlighting
kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

# Collections
collections:
  tabs:
    output: true
    sort_by: order

# Default layouts
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
      permalink: /posts/:title/

  - scope:
      path: _drafts
    values:
      comments: false

  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

# Sass compression
sass:
  style: compressed

# HTML compression
compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

# Files excluded from build
exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"
  - node_modules
  - vendor

# Archives
jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
